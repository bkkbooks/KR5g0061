body:
  text: 靜餘玄問席六相問所得旁門小訣先生云吞嚥一事雲房三十九章已言之矣畢竟上嚥下泄無所歸蓋四大一身皆屬陰且道陽在甚處相問陽在甚處先生云在乎杳杳冥冥恍惚之中釋氏有云不屬中間與内外是也邵康節亦曰見時似有覔時無自内求之皆屬陰也自外求之則又非正陽畢竟此事難説相問參同契所論日月龍虎是精血麽曰非也是精氣麽曰非也相曰如是則是甚麽字先生云只是神氣二字先生云既是行法且可精進法不可多多則將來何所歸先生又云行法如做官修道如隱遯如何一手捉得兩條蛇先生云自紫陽下四代真人都只在相問既有解化月日何得云在先生云畢竟這箇是肉身先生因説紫陽天台人杏林常州人毗陵師閬州人翠虚惠州人又云𢖍州人先生忽於卧席下出都天大雷玉書以授相可將歸急寫明日送來念汝一生慕道之心成汝一生慕道之志相間翠虛真人既號翠虛又稱泥丸如何先生云翠虚子乃其自號嘗以泥丸與人治病故湖廣中人呼之爲陳泥丸相問翠虛真人得法之由先生云先師得雷書於黎母山中不言其人姓氏恐是神人所授也丹法却是道光和尚所傳先師嘗醉語云我是雷部辛判官弟子干道光和尚甚事相問翠虚解化之由先生云先師嘉定六年四月十四日在漳州梁山與一箍桶老子掎角入水而逝當日有潮州葛縣尉在潭州寧鄉縣見之先師與尉之父爲久契因寄一書使尉歸以達其父後方知當日在此死在彼見予時隨侍在彼目覩其事其箍桶老子有一斧在地先師既相與入水勢不可救因與一二人同歸尋其斧則亦不見先師彼時在漳州赴鶴會罷説與會主云我要來會裏尸解會主不以爲事遂留四句命予題之會中而去題云頂上雷聲霹靂混沌落地無蹤今朝得路便行騎箇無角火龍湖廣中人常勒先師做詩但見自口縷縷而出皆成文理第不肯把筆耳相問曰相之事先生其日淺邪六年矣所得深邪先生之道如海洪淵莫竊相從容之日見先生爲人驅邪治病或與之泥塊或與之木札或石或炭或可食或不可食或物或非物或有符水或但吿之以方略每不與不吿之者皆不可治與而吿之者例作効相不知其如何竊亦心領意會俲先生之所爲往往亦靈驗曰此非世人所知先生曰自涕唾精津氣血液之外有真身不必去此而就彼自喜怒哀樂愛惡欲之外有真性不必是此而非彼冥然無所念宴然無所思終日食而不味終日衣而不絲謂我容心於其間則飢寒飽暖焉可憂生死苦樂爲足憑其知道之見邪能知乎此審能如此則知張道陵許遜葛洪之徒有妻子亦仙也有酒肉亦仙也其迹同於人其心異於人吾所以混俗和光者不欲自異耳魚欲異羣魚捨水躍岸則死虎欲異羣虎捨山入巿則擒相曰吁誠哉吾生死有命貴賤有天世人何不樂天知命徒爾惡死而好生惡賤而好貴夫寒暑付之天時此身非我有實天所生天將寒暑之聽其如之何也已先生曰度人經云欲界色界無色界此三界也天心法書云天界地界空界此三界也今之人有曰上中下三界是其考究不精矣或又曰天地水三界則又謬之甚焉經云泉曲之府北都羅酆如是則地水皆屬下界明矣甚至以酆都大帝爲地界之主扶桑大帝爲水界之主若論玉皇大天尊正爲天界之主后土皇地祇正爲地界之主斯當也如酆都大帝扶桑大帝特一司之主宰耳先生曰修丹口訣第一是要聚氣凝神又曰常常握固即聚氣念念守嘿即凝神又曰萬神常凝謂之靈一氣不散謂之寳又曰金丹即靈寳靈寳即金丹又曰心荒即神狂狂則亂亂則不凝又曰心寧則氣和和則定定則不散又曰䕶惜元氣如護惜眼睛又曰心死方得神活魄滅然後魂昌又曰心常如愚常要活潑潑如走盤珠故曰圓通又曰此心呆又不是死又不凝又曰先學無心次學忘形先生吿相曰爾謂十一曜呪誠太上所説乎曰誠哉曰嘻彼呪中有謂甘石推流伏然甘德石申皆星翁也却是春秋戰國時人甘石未生此呪先有質之於此豈太上所説耶先生問紫元留元長曰爾謂世間混元如意之法誠然乎曰然曰嘻彼法中有呪云北極佑聖真君律令又曰三天扶教輔玄大法師律令果爾則可疑也佑聖乃周時人天師乃漢時人若是混元法已在太上之先亦不應用太上老君律令矣況佑聖與天師乎何哉謂混元也先生曰先師泥丸翁昔在徽廟時嘗遇大洞真人孫君與之曰昔者元始天尊與太上老君所説經教甚不多後人採摭編録遂成一藏如北斗經乃張正一所作南斗經乃王長所作之類大凡教人課誦不如靈寳度人經玉皇天尊號爲愈也先生告相曰得道者如嬰兒之在母胎得法者如元帥之坐籌幄先生曰昔高麗僧有丹訣云不是有形物不是無形物看見烏硉矹此是造化骨靜餘玄問
